<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sully-Bec | Portal de Alumnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --verde-agua: #2D8B7D; /* El nuevo color principal */
            --verde-menta: #E6F4F1;
            --rosa-fondo: #FDF4F0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--rosa-fondo); 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1E293B;
        }

        .glass-card {
            background: #ffffff;
            border-radius: 3.5rem;
            box-shadow: 0 40px 100px -20px rgba(45, 139, 125, 0.15);
            width: 100%;
            max-width: 440px;
            padding: 3.5rem 2.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
        }

        .logo-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 2.5rem;
            background: white;
            padding: 10px;
            box-shadow: 0 15px 30px -5px rgba(45, 139, 125, 0.2);
            position: relative;
            z-index: 2;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130%;
            height: 130%;
            background: var(--verde-agua);
            filter: blur(30px);
            opacity: 0.15;
            z-index: 1;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 800;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-left: 1.25rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 1.1rem 1.5rem;
            background: #F8FAFC;
            border: 2px solid #F1F5F9;
            border-radius: 1.5rem;
            outline: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--verde-agua);
            background: #ffffff;
            box-shadow: 0 10px 20px -5px rgba(45, 139, 125, 0.05);
        }

        .btn-primary {
            background-color: var(--verde-agua);
            color: white;
            width: 100%;
            padding: 1.2rem;
            border-radius: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.85rem;
            margin-top: 1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px -10px rgba(45, 139, 125, 0.4);
            filter: brightness(1.1);
        }

        .badge-active {
            background: #ECFDF5;
            color: #059669;
            padding: 0.4rem 1rem;
            border-radius: 1rem;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .text-accent { color: var(--verde-agua); }
        .bg-accent { background-color: var(--verde-agua); }

        #errorMessage {
            color: #EF4444;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 1rem;
            display: none;
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- PANTALLA DE ACCESO -->
    <div id="login-screen" class="glass-card">
        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="https://drive.google.com/thumbnail?id=1gjM8QJhfynpT0il86P3IRWwD_wMQWcCC&sz=w500" alt="Logo SullyBec" class="logo-img">
        </div>
        
        <h1 class="text-xl font-black text-slate-800 mb-1 tracking-tight uppercase leading-none">Bienvenido a</h1>
        <h2 class="text-2xl font-black text-accent mb-1 tracking-tighter uppercase">SullyBec Instituto</h2>
        <p class="text-slate-400 text-[9px] font-bold uppercase tracking-[0.3em] mb-10 italic opacity-60">Portal Académico Digital</p>

        <form id="loginForm">
            <div class="input-group">
                <label>ID de Alumno</label>
                <input type="text" id="studentId" placeholder="Ej: SB-AN09700" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="Ej: Sotelo@1323" required>
            </div>
            
            <p id="errorMessage">Los datos no son válidos</p>

            <button type="submit" id="submitBtn" class="btn-primary">
                Entrar al Sistema
            </button>
        </form>
    </div>

    <!-- PANEL DEL ESTUDIANTE -->
    <div id="student-panel" class="hidden w-full max-w-2xl mx-auto p-4">
        <div class="bg-white rounded-[4rem] p-10 md:p-14 shadow-2xl border border-white">
            <div class="flex items-center gap-6 mb-10 border-b border-slate-50 pb-10">
                <div id="studentPhoto" class="w-24 h-24 bg-teal-50 rounded-[2rem] flex items-center justify-center text-accent font-black text-2xl border border-teal-100 overflow-hidden">
                    SB
                </div>
                <div>
                    <div class="flex items-center gap-3 mb-1">
                        <h2 id="studentName" class="text-3xl font-black text-slate-800 tracking-tighter">Cargando...</h2>
                        <span class="badge-active">ACTIVO</span>
                    </div>
                    <p id="studentCourse" class="text-accent font-bold uppercase text-[10px] tracking-widest">Diplomado Académico</p>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Mensualidad</p>
                    <p id="studentCost" class="text-3xl font-black text-slate-800 tracking-tight">$ 0.00</p>
                </div>
                <div class="bg-teal-50/50 p-8 rounded-[2.5rem] border border-teal-100/50">
                    <p class="text-[10px] font-black text-accent uppercase tracking-widest mb-2">Mi ID</p>
                    <p id="displayId" class="text-3xl font-black text-accent tracking-tight">#SB-000</p>
                </div>
            </div>

            <div class="bg-accent p-10 rounded-[3rem] text-white shadow-xl shadow-teal-900/20 relative overflow-hidden">
                <div class="relative z-10">
                    <h3 class="font-black uppercase text-xs tracking-widest mb-6 opacity-80">Gestión Académica</h3>
                    <div class="space-y-3">
                        <button class="w-full bg-white text-accent p-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-100 transition-colors">
                            Descargar Mi Recibo
                        </button>
                    </div>
                </div>
                <div class="absolute -right-20 -bottom-20 w-64 h-64 bg-white/5 rounded-full"></div>
            </div>

            <button onclick="location.reload()" class="mt-8 text-slate-300 font-bold text-[10px] uppercase tracking-widest hover:text-red-400 transition-colors">
                Cerrar Sesión Segura
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcAda5-ewiR78bfLyYrjEMhfdc0RFxd7s",
            authDomain: "finanzas-escuela.firebaseapp.com",
            projectId: "finanzas-escuela",
            storageBucket: "finanzas-escuela.firebasestorage.app",
            messagingSenderId: "106864276061",
            appId: "1:106864276061:web:cc8b26cca0ef07088f13b4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="loading-spinner"></span> Entrando...`;
            errorMsg.style.display = 'none';

            const id = document.getElementById('studentId').value.trim();
            const pass = document.getElementById('password').value;

            try {
                await signInAnonymously(auth);
                // NOTA: Asegúrate de que en tu base de datos el ID del documento sea como "SB-AN09700"
                const docRef = doc(db, 'artifacts', 'finanzas-escuela', 'public', 'data', 'students', id);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().password === pass) {
                    const data = docSnap.data();
                    
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('student-panel').classList.remove('hidden');
                    
                    document.getElementById('studentName').innerText = data.nombre;
                    document.getElementById('studentCourse').innerText = data.diplomado || "Diplomado SullyBec";
                    document.getElementById('studentCost').innerText = '$ ' + (data.costo || "0.00");
                    document.getElementById('displayId').innerText = id;
                    
                    if(data.photo) {
                        document.getElementById('studentPhoto').innerHTML = `<img src="${data.photo}" class="w-full h-full object-cover">`;
                    }
                } else {
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Entrar al Sistema";
                }
            } catch (err) {
                console.error(err);
                alert("Error de conexión. Intenta de nuevo.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Entrar al Sistema";
            }
        });
    </script>
</body>
</html>
