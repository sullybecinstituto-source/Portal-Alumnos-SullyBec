<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sully-Bec | Acceso</title>
    <!-- Tailwind para el diseño instantáneo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FFF6F2; /* El fondo rosa suave */
            margin: 0;
            display: flex;
            align-items: center;
            justify-center;
            min-height: 100vh;
        }
        .login-card {
            background: #ffffff;
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(139, 29, 45, 0.15);
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            text-align: center;
            border: 1px solid #ffffff;
        }
        .btn-primary {
            background-color: #8B1D2D;
            color: white;
            width: 100%;
            padding: 1rem;
            border-radius: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 1.5rem;
            transition: all 0.3s;
        }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
        input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: #F8FAFC;
            border: 1px solid #F1F5F9;
            border-radius: 1.2rem;
            margin-top: 0.5rem;
            outline: none;
            font-weight: 600;
        }
        label {
            font-size: 10px;
            font-weight: 800;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: block;
            text-align: left;
            margin-left: 1rem;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="login-card mx-auto">
        <!-- Logo Temporal / Siglas -->
        <div class="w-20 h-20 bg-[#8B1D2D] text-white rounded-3xl mx-auto mb-6 flex items-center justify-center text-3xl font-black italic shadow-lg">
            SB
        </div>
        
        <h1 class="text-2xl font-black text-slate-800 mb-1 uppercase tracking-tighter">Portal Alumnos</h1>
        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-8">Sully-Bec Instituto</p>

        <form id="loginForm" class="space-y-4">
            <div>
                <label>ID de Alumno</label>
                <input type="text" id="studentId" placeholder="Ej: 101" required>
            </div>
            <div>
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••" required>
            </div>
            <p id="errorMessage" class="text-red-500 text-[10px] font-black uppercase mt-2 hidden">ID o contraseña incorrectos</p>
            <button type="submit" class="btn-primary shadow-xl">Entrar al Sistema</button>
        </form>
    </div>

    <!-- El Panel del Alumno (Oculto al inicio) -->
    <div id="student-panel" class="hidden w-full max-w-2xl mx-auto p-6">
        <div class="bg-white rounded-[3rem] p-10 shadow-2xl">
            <div class="flex items-center gap-6 mb-8 border-b pb-8">
                <div id="studentPhoto" class="w-24 h-24 bg-red-50 rounded-3xl flex items-center justify-center text-[#8B1D2D] font-bold text-2xl border border-red-100">SB</div>
                <div>
                    <h2 id="studentName" class="text-3xl font-black text-slate-800 tracking-tighter">Cargando...</h2>
                    <p id="studentCourse" class="text-[#8B1D2D] font-bold uppercase text-[10px] tracking-widest">Diplomado</p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-50 p-6 rounded-3xl">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Costo</p>
                    <p id="studentCost" class="text-2xl font-black text-[#8B1D2D]">$0.00</p>
                </div>
                <div class="bg-emerald-50 p-6 rounded-3xl text-emerald-600">
                    <p class="text-[9px] font-black uppercase mb-1 opacity-50">Estado</p>
                    <p class="text-xs font-black uppercase tracking-widest">Activo</p>
                </div>
            </div>

            <div class="bg-[#8B1D2D] p-8 rounded-[2.5rem] text-white">
                <p class="font-black uppercase text-[10px] mb-4">Mis Documentos</p>
                <button class="w-full bg-white/10 p-4 rounded-xl font-bold text-sm border border-white/10">Descargar Recibo Digital</button>
            </div>
        </div>
    </div>

    <!-- Lógica de Conexión -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcAda5-ewiR78bfLyYrjEMhfdc0RFxd7s",
            authDomain: "finanzas-escuela.firebaseapp.com",
            projectId: "finanzas-escuela",
            storageBucket: "finanzas-escuela.firebasestorage.app",
            messagingSenderId: "106864276061",
            appId: "1:106864276061:web:cc8b26cca0ef07088f13b4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('studentId').value.trim();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            try {
                await signInAnonymously(auth);
                const docRef = doc(db, 'artifacts', 'finanzas-escuela', 'public', 'data', 'students', id);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().password === pass) {
                    const data = docSnap.data();
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('student-panel').classList.remove('hidden');
                    
                    document.getElementById('studentName').innerText = data.nombre;
                    document.getElementById('studentCourse').innerText = data.diplomado;
                    document.getElementById('studentCost').innerText = '$ ' + data.costo;
                    if(data.photo) document.getElementById('studentPhoto').innerHTML = `<img src="${data.photo}" class="w-full h-full object-cover rounded-3xl">`;
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                alert("Error de conexión con la base de datos");
            }
        });
    </script>
</body>
</html>
