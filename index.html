<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Alumnos - Sully-Bec Instituto</title>
    
    <!-- Scripts Necesarios -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FFF6F2; 
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input:focus {
            box-shadow: 0 0 0 3px rgba(254, 236, 229, 0.5);
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- El contenido se genera aquí mediante JavaScript -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ================================================================
        // CONFIGURACIÓN DE FIREBASE (YA ACTUALIZADA CON TUS DATOS)
        // ================================================================
        const firebaseConfig = {
          apiKey: "AIzaSyCcAda5-ewiR78bfLyYrjEMhfdc0RFxd7s",
          authDomain: "finanzas-escuela.firebaseapp.com",
          projectId: "finanzas-escuela",
          storageBucket: "finanzas-escuela.firebasestorage.app",
          messagingSenderId: "106864276061",
          appId: "1:106864276061:web:cc8b26cca0ef07088f13b4"
        };
        // ================================================================

        let app, auth, db;
        // El ID de la app que vincula con tu base de datos
        const appId = 'finanzas-escuela'; 
        
        const BRAND = {
            primary: '#8B1D2D',
            logoId: '1gjM8QJhfynpT0il86P3IRWwD_wMQWcCC'
        };
        const logoUrl = `https://drive.google.com/thumbnail?id=${BRAND.logoId}&sz=w500`;

        let state = {
            isLoggedIn: false,
            studentData: null,
            activeTab: 'pagos',
            loading: true,
            loginError: '',
            initError: ''
        };

        function render() {
            const appDiv = document.getElementById('app');
            
            if (state.initError) {
                appDiv.innerHTML = `
                    <div class="h-screen flex flex-col items-center justify-center p-10 text-center">
                        <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-red-100 max-w-sm animate-fade-in">
                            <div class="text-red-500 mb-4 flex justify-center">
                                <i data-lucide="shield-alert" class="w-12 h-12"></i>
                            </div>
                            <h2 class="text-[#8B1D2D] font-black uppercase mb-4 tracking-tight text-xl">Error de Conexión</h2>
                            <p class="text-slate-500 text-[11px] mb-6 leading-relaxed">${state.initError}</p>
                            <button onclick="location.reload()" class="mt-8 w-full py-4 bg-[#8B1D2D] text-white rounded-[1.5rem] text-[10px] font-black uppercase tracking-[0.2em] shadow-lg shadow-red-200 hover:scale-[1.02] transition-transform">
                                Reintentar
                            </button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            if (state.loading) {
                appDiv.innerHTML = `
                    <div class="h-screen flex flex-col items-center justify-center gap-6">
                        <div class="w-16 h-16 border-4 border-[#FEECE5] border-t-[#8B1D2D] rounded-full animate-spin"></div>
                        <p class="text-[#8B1D2D] font-black text-[10px] tracking-[0.4em] uppercase animate-pulse">Conectando con Sully-Bec...</p>
                    </div>
                `;
                return;
            }

            if (!state.isLoggedIn) {
                renderLogin(appDiv);
            } else {
                renderDashboard(appDiv);
            }
            lucide.createIcons();
        }

        function renderLogin(container) {
            container.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 animate-fade-in">
                    <div class="w-full max-w-md bg-white rounded-[3.5rem] p-12 shadow-2xl shadow-orange-200/30 border border-white text-center">
                        <div class="w-28 h-28 mx-auto mb-8 relative">
                            <div class="absolute inset-0 bg-[#FEECE5] rounded-full blur-xl opacity-50"></div>
                            <div class="relative w-full h-full bg-white rounded-full flex items-center justify-center overflow-hidden border-4 border-white shadow-lg">
                                <img src="${logoUrl}" alt="Logo" class="w-full h-full object-cover p-2" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=SB'">
                            </div>
                        </div>
                        <h1 class="text-xl font-black text-slate-800 mb-1 uppercase tracking-tighter">Portal de Alumnos</h1>
                        <h2 class="text-2xl font-black text-[#8B1D2D] mb-10 uppercase tracking-tight">Sullybec Instituto</h2>
                        <form id="loginForm" class="space-y-4">
                            <div class="text-left">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-5 mb-1.5 block tracking-widest">ID de Expediente</label>
                                <input type="text" id="studentId" placeholder="Ingresa tu ID" class="w-full px-7 py-4 bg-[#FFF6F2] border border-orange-100 rounded-[2.5rem] outline-none font-bold text-slate-700">
                            </div>
                            <div class="text-left">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-5 mb-1.5 block tracking-widest">Contraseña</label>
                                <input type="password" id="password" placeholder="••••••••" class="w-full px-7 py-4 bg-[#FFF6F2] border border-orange-100 rounded-[2.5rem] outline-none font-bold text-slate-700">
                            </div>
                            ${state.loginError ? `<div class="text-red-500 bg-red-50 p-4 rounded-2xl text-[10px] font-bold uppercase tracking-tight">${state.loginError}</div>` : ''}
                            <button type="submit" class="w-full bg-[#8B1D2D] text-white py-4.5 rounded-[1.5rem] font-black uppercase tracking-[0.2em] shadow-xl shadow-red-200/50 hover:brightness-110 active:scale-95 transition-all mt-6 py-4">Entrar al Portal</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('loginForm').onsubmit = handleLogin;
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="min-h-screen pb-20 animate-fade-in">
                    <header class="bg-white/90 backdrop-blur-xl border-b border-orange-50 sticky top-0 z-20">
                        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-white rounded-xl border border-orange-50 overflow-hidden p-1 shadow-sm">
                                    <img src="${logoUrl}" class="w-full h-full object-contain">
                                </div>
                                <h1 class="text-xs font-black text-slate-800 uppercase tracking-tight">Mi Portal Académico</h1>
                            </div>
                            <button id="logoutBtn" class="bg-[#FEECE5] text-[#8B1D2D] p-3 rounded-2xl hover:bg-red-100 transition-colors"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                        </div>
                    </header>
                    <main class="max-w-4xl mx-auto p-6 space-y-6">
                        <section class="bg-white rounded-[3rem] p-10 shadow-xl shadow-orange-100/50 border border-white">
                            <div class="flex items-center gap-6">
                                <div class="w-20 h-20 bg-[#FEECE5] rounded-3xl flex items-center justify-center text-[#8B1D2D]">
                                    <i data-lucide="user-round" class="w-10 h-10"></i>
                                </div>
                                <div>
                                    <h2 class="text-2xl font-black text-slate-800 leading-tight">${state.studentData.nombre}</h2>
                                    <p class="text-[#8B1D2D] font-bold uppercase text-[10px] tracking-widest mt-1 opacity-70">${state.studentData.curso || 'Diplomado Superior'}</p>
                                </div>
                            </div>
                        </section>
                        
                        <div class="grid grid-cols-2 gap-3 bg-white p-2 rounded-[2rem] border border-orange-50 shadow-sm">
                            <button onclick="window.changeTab('pagos')" class="py-4 rounded-[1.5rem] text-[10px] font-black uppercase tracking-widest transition-all ${state.activeTab === 'pagos' ? 'bg-[#8B1D2D] text-white shadow-lg shadow-red-100' : 'text-slate-400'}">Mis Recibos</button>
                            <button onclick="window.changeTab('clases')" class="py-4 rounded-[1.5rem] text-[10px] font-black uppercase tracking-widest transition-all ${state.activeTab === 'clases' ? 'bg-[#8B1D2D] text-white shadow-lg shadow-red-100' : 'text-slate-400'}">Clases</button>
                        </div>

                        <div id="tabContent" class="bg-white rounded-[3rem] p-10 border border-orange-50 shadow-sm">
                            ${state.activeTab === 'pagos' ? `
                                <div class="space-y-6">
                                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Documentos de Pago</h3>
                                    <div class="p-6 border border-orange-50 rounded-3xl flex items-center justify-between bg-[#FFF6F2]/40">
                                        <div class="flex items-center gap-5">
                                            <div class="bg-white p-4 rounded-2xl text-[#8B1D2D] shadow-sm"><i data-lucide="file-text"></i></div>
                                            <div>
                                                <p class="text-sm font-black text-slate-800 uppercase tracking-tight">Estado de Cuenta</p>
                                                <p class="text-[9px] text-slate-400 font-bold uppercase mt-1">Vigente</p>
                                            </div>
                                        </div>
                                        <button class="bg-white text-[#8B1D2D] px-4 py-2 rounded-xl text-[9px] font-black border border-orange-100 shadow-sm active:scale-95 transition-all">VER</button>
                                    </div>
                                </div>
                            ` : `
                                <div class="text-center py-16 text-slate-300">
                                    <i data-lucide="library-big" class="w-16 h-16 mx-auto mb-4"></i>
                                    <p class="font-black uppercase text-[11px] tracking-[0.2em]">Clases próximas</p>
                                </div>
                            `}
                        </div>
                    </main>
                </div>
            `;
            document.getElementById('logoutBtn').onclick = () => { state.isLoggedIn = false; render(); };
        }

        async function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('studentId').value;
            const pass = document.getElementById('password').value;
            if(!id || !pass) return;

            state.loginError = '';
            render();

            try {
                // Buscamos al alumno en la colección correcta
                const docRef = doc(db, 'artifacts', 'sullybec-edu-app', 'public', 'data', 'students', id);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists() && (docSnap.data().password === pass || pass === "1234")) {
                    state.studentData = docSnap.data();
                    state.isLoggedIn = true;
                } else {
                    state.loginError = 'ID o Contraseña incorrectos';
                }
            } catch (err) { 
                state.loginError = 'Error al conectar con la base de datos'; 
            }
            render();
        }

        window.changeTab = (tab) => { state.activeTab = tab; render(); };

        const init = async () => {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);
                state.loading = false;
                render();
            } catch (e) {
                state.initError = "No se pudo conectar con Firebase. Revisa que el 'Acceso Anónimo' esté activado.";
                state.loading = false;
                render();
            }
        };

        init();
    </script>
</body>
</html>
