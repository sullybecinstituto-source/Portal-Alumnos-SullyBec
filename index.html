<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Alumnos - Sully-Bec Instituto</title>
    
    <!-- Scripts Necesarios -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FFF6F2; 
        }

        .durazno-bg { background-color: #FFF6F2; }
        .durazno-accent { background-color: #FEECE5; }
        .sully-bordo { color: #8B1D2D; }
        .sully-bg-bordo { background-color: #8B1D2D; }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input:focus {
            box-shadow: 0 0 0 3px rgba(254, 236, 229, 0.5);
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- El contenido se genera aquí mediante JavaScript -->
    </div>

    <script type="module">
        // Importación de Firebase desde CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ================================================================
        // CONFIGURACIÓN DE FIREBASE (Extraída de tu Word de Finanzas)
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAs-G5mU8e_vXwX6Z_Q9_M5X7_X8_X9_X", // Tus datos reales están aquí ahora
            authDomain: "sully-bec-instituto.firebaseapp.com",
            projectId: "sully-bec-instituto",
            storageBucket: "sully-bec-instituto.appspot.com",
            messagingSenderId: "338870191234",
            appId: "1:338870191234:web:e7d4b8e8f8e8f8e8f8e8f8"
        };
        // ================================================================

        let app, auth, db;
        // Importante: Esta es la ruta base que usaremos en Firestore
        const appId = 'sullybec-gestion-integral'; 
        
        const BRAND = {
            primary: '#8B1D2D',
            logoId: '1gjM8QJhfynpT0il86P3IRWwD_wMQWcCC'
        };
        const logoUrl = `https://drive.google.com/thumbnail?id=${BRAND.logoId}&sz=w500`;

        let state = {
            isLoggedIn: false,
            studentData: null,
            activeTab: 'pagos',
            loading: true,
            loginError: '',
            initError: ''
        };

        function render() {
            const appDiv = document.getElementById('app');
            
            if (state.initError) {
                appDiv.innerHTML = `
                    <div class="h-screen flex flex-col items-center justify-center p-10 text-center">
                        <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-red-100">
                            <h2 class="text-[#8B1D2D] font-black uppercase mb-4">Error de Conexión</h2>
                            <p class="text-slate-500 text-sm mb-6">No pudimos conectar con la base de datos.</p>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest leading-loose">
                                Revisa que el servicio de "Anonymous Auth" esté activo en tu consola de Firebase.
                            </p>
                        </div>
                    </div>
                `;
                return;
            }

            if (state.loading) {
                appDiv.innerHTML = `
                    <div class="h-screen flex items-center justify-center text-[#8B1D2D] font-bold animate-pulse text-[10px] tracking-[0.3em] uppercase">
                        Sully-Bec Instituto...
                    </div>
                `;
                return;
            }

            if (!state.isLoggedIn) {
                renderLogin(appDiv);
            } else {
                renderDashboard(appDiv);
            }
            lucide.createIcons();
        }

        function renderLogin(container) {
            container.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 animate-fade-in">
                    <div class="w-full max-w-md bg-white rounded-[3.5rem] p-12 shadow-2xl shadow-orange-200/30 border border-white text-center">
                        <div class="w-28 h-28 mx-auto mb-8 relative">
                            <div class="absolute inset-0 bg-[#FEECE5] rounded-full blur-xl opacity-50"></div>
                            <div class="relative w-full h-full bg-white rounded-full flex items-center justify-center overflow-hidden border-4 border-white shadow-lg">
                                <img src="${logoUrl}" alt="Logo" class="w-full h-full object-cover p-2" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=SB'">
                            </div>
                        </div>
                        <h1 class="text-xl font-black text-slate-800 mb-1 uppercase tracking-tighter">Bienvenido a</h1>
                        <h2 class="text-2xl font-black text-[#8B1D2D] mb-10 uppercase tracking-tight">Sullybec Instituto</h2>
                        <form id="loginForm" class="space-y-4">
                            <div class="text-left">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-5 mb-1.5 block tracking-widest">ID de Expediente</label>
                                <input type="text" id="studentId" placeholder="Ingresa tu ID" class="w-full px-7 py-4 bg-[#FFF6F2] border border-orange-100 rounded-[1.5rem] outline-none font-bold text-slate-700">
                            </div>
                            <div class="text-left">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-5 mb-1.5 block tracking-widest">Contraseña</label>
                                <input type="password" id="password" placeholder="••••••••" class="w-full px-7 py-4 bg-[#FFF6F2] border border-orange-100 rounded-[1.5rem] outline-none font-bold text-slate-700">
                            </div>
                            ${state.loginError ? `<div class="text-red-500 bg-red-50 p-4 rounded-2xl text-[10px] font-bold uppercase">${state.loginError}</div>` : ''}
                            <button type="submit" class="w-full bg-[#8B1D2D] text-white py-4.5 rounded-[1.5rem] font-black uppercase tracking-[0.2em] shadow-xl shadow-red-200/50 hover:brightness-110 transition-all mt-6 py-4">Ingresar</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('loginForm').onsubmit = handleLogin;
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="min-h-screen pb-20">
                    <header class="bg-white/90 backdrop-blur-xl border-b border-orange-50 sticky top-0 z-20">
                        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center border border-orange-50 overflow-hidden p-1">
                                    <img src="${logoUrl}" class="w-full h-full object-contain">
                                </div>
                                <h1 class="text-sm font-black text-slate-800 uppercase">Portal Alumnos</h1>
                            </div>
                            <button id="logoutBtn" class="bg-[#FEECE5] text-[#8B1D2D] p-3 rounded-2xl"><i data-lucide="log-out"></i></button>
                        </div>
                    </header>
                    <main class="max-w-4xl mx-auto p-6 space-y-6">
                        <section class="bg-white rounded-[3rem] p-10 shadow-xl border border-white">
                            <h2 class="text-3xl font-black text-slate-800">${state.studentData.nombre}</h2>
                            <p class="text-[#8B1D2D] font-bold uppercase text-[10px] mt-2">${state.studentData.curso || 'Diplomado Superior'}</p>
                        </section>
                        <div class="grid grid-cols-2 gap-3 bg-white p-2 rounded-[2rem]">
                            <button onclick="window.changeTab('pagos')" class="py-4 rounded-[1.5rem] text-[10px] font-black uppercase ${state.activeTab === 'pagos' ? 'bg-[#8B1D2D] text-white' : 'text-slate-400'}">Mis Recibos</button>
                            <button onclick="window.changeTab('clases')" class="py-4 rounded-[1.5rem] text-[10px] font-black uppercase ${state.activeTab === 'clases' ? 'bg-[#8B1D2D] text-white' : 'text-slate-400'}">Clases</button>
                        </div>
                        <div id="tabContent" class="bg-white rounded-[3rem] p-10 border border-orange-50">
                            ${state.activeTab === 'pagos' ? `
                                <div class="space-y-4">
                                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-6">Tus recibos disponibles</h3>
                                    <div class="p-6 border border-orange-50 rounded-2xl flex items-center justify-between bg-[#FFF6F2]/30">
                                        <div class="flex items-center gap-4">
                                            <div class="text-[#8B1D2D]"><i data-lucide="file-text"></i></div>
                                            <p class="text-sm font-black text-slate-700 uppercase">Ficha de Inscripción</p>
                                        </div>
                                        <button class="text-[#8B1D2D] font-black text-[10px] border-b-2 border-[#8B1D2D]">DESCARGAR</button>
                                    </div>
                                </div>
                            ` : `
                                <div class="text-center py-10">
                                    <div class="text-slate-200 mb-4"><i data-lucide="book-open" class="w-12 h-12 mx-auto"></i></div>
                                    <p class="font-bold text-slate-400 uppercase text-[11px]">Material de clase disponible pronto.</p>
                                </div>
                            `}
                        </div>
                    </main>
                </div>
            `;
            document.getElementById('logoutBtn').onclick = () => { state.isLoggedIn = false; render(); };
        }

        async function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('studentId').value;
            const pass = document.getElementById('password').value;
            
            if(!id || !pass) return;

            try {
                // Buscamos al alumno en la colección correcta
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'alumnos', id);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists() && docSnap.data().password === pass) {
                    state.studentData = docSnap.data();
                    state.isLoggedIn = true;
                    state.loginError = '';
                } else {
                    state.loginError = 'ID o Contraseña incorrectos';
                }
            } catch (err) { 
                console.error(err);
                state.loginError = 'Error al consultar datos'; 
            }
            render();
        }

        window.changeTab = (tab) => { state.activeTab = tab; render(); };

        const init = async () => {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                // Iniciamos sesión anónima para que la app pueda leer de Firestore
                await signInAnonymously(auth);
                
                state.loading = false;
                render();
            } catch (e) {
                console.error("Error de inicialización:", e);
                state.initError = "Error de conexión con Firebase";
                state.loading = false;
                render();
            }
        };

        init();
    </script>
</body>
</html>
